{% extends "usuarios/base.html" %}

{% block title %}Nuevo Usuario — Winening{% endblock %}

{% block content %}
<h1>Crear Usuario</h1>
<br>
<div class="card">
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="username">Username *</label>
            <input type="text" name="username" id="username" required>
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" name="email" id="email">
        </div>
        <div class="form-group">
            <label for="first_name">Nombre</label>
            <input type="text" name="first_name" id="first_name">
        </div>
        <div class="form-group">
            <label for="last_name">Apellido</label>
            <input type="text" name="last_name" id="last_name">
        </div>
        <div class="form-group">
            <label for="password">Contraseña</label>
            <input type="password" name="password" id="password" minlength="6">
        </div>
        <div class="form-group">
            <label for="nivel_catador">Nivel de Catador</label>
            <select name="nivel_catador" id="nivel_catador">
                {% for value, label in niveles %}
                    <option value="{{ value }}">{{ label }}</option>
                {% endfor %}
            </select>
        </div>
        <button type="submit" class="btn btn-primary">Crear Usuario</button>
        <a href="{% url 'usuarios:lista_usuarios' %}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
{% endblock %}
