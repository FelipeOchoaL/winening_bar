upstream django_web {
    server django:8000;
}

upstream flask_pagos {
    server flask_pagos:5000;
}

server {
    listen 80;

    location /api/v2/pagos/ {
        proxy_pass http://flask_pagos;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
        proxy_pass http://django_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
